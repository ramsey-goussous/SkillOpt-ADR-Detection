# SkillOpt settings for the ADR extraction run.
# run_adr_skillopt.ps1 copies this into external/SkillOpt/configs/adr/default.yaml.
_base_: ../_base_/default.yaml
model:
  backend: claude
  target_backend: claude
  optimizer_backend: claude
  reasoning_effort: medium
train:
  train_size: 0          # 0 means use the full generated train split
  batch_size: 4
  accumulation: 1
gradient:
  minibatch_size: 4
  merge_batch_size: 4
  analyst_workers: 1     # keep optimizer calls serial unless the account can handle parallel calls
optimizer:
  learning_rate: 4
  skill_update_mode: patch
evaluation:
  use_gate: true        # keep an edit only if it raises the val score
  # Gate on the COMPOSITE score (soft), not exact pair-match (hard): our reward
  # is the composite, and `hard` is ~always 0 on negative/hard-negative notes,
  # so a hard gate can never accept an edit.
  gate_metric: soft
  eval_test: false      # keep training focused on train/validation unless RUN_TEST_EVAL=1
env:
  name: adr
  skill_init: skillopt/envs/adr/skills/initial.md
  split_mode: split_dir
  split_dir: data/adr_split
  max_turns: 1
  workers: 1             # target-model rollout calls are serial by default
  limit: 0
